name: sao_desktop
description: SAO Desktop - Sistema de Administración y Control
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Local Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # PDF Generation & Printing
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.2
  url_launcher: ^6.3.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  google_sign_in: ^6.3.0
  http: ^1.2.2
  package_info_plus: ^8.0.2
  
  # Secure credential storage (Windows Credential Manager via DPAPI)
  flutter_secure_storage: ^9.2.2
  file_picker: ^8.1.2

  # Map
  flutter_map: ^6.2.1
  latlong2: ^0.9.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  # ============================================================
  # ASSETS: Iconos, Imágenes, Catálogos JSON
  # ============================================================
  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/catalogos.json

  # ============================================================
  # FONTS: Tipografía centralizada (Inter)
  # ============================================================
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #
  # NOTA: Descomentar cuando se agreguen los archivos de fuentes
  # Descargar Inter desde: https://fonts.google.com/specimen/Inter
