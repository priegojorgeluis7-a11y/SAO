name: Flutter Platform Builds

on:
  pull_request:
    paths:
      - 'frontend_flutter/sao_windows/**'
      - 'desktop_flutter/sao_desktop/**'
      - '.github/workflows/flutter-platform-builds.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend_flutter/sao_windows/**'
      - 'desktop_flutter/sao_desktop/**'
      - '.github/workflows/flutter-platform-builds.yml'

concurrency:
  group: flutter-platform-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-android:
    name: Mobile Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_flutter/sao_windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --debug

  mobile-ios:
    name: Mobile iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend_flutter/sao_windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS simulator app
        run: flutter build ios --simulator --no-codesign

  desktop-macos:
    name: Desktop macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop_flutter/sao_desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate builders
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Build macOS app
        run: flutter build macos --dart-define=SAO_BACKEND_URL=https://sao-api-fjzra25vya-uc.a.run.app

  desktop-windows:
    name: Desktop Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop_flutter/sao_desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate builders
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Build Windows app
        run: flutter build windows --dart-define=SAO_BACKEND_URL=https://sao-api-fjzra25vya-uc.a.run.app
