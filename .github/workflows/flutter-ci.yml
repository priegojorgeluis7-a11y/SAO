name: Flutter CI

on:
  pull_request:
    paths:
      - 'frontend_flutter/sao_windows/**'
      - '.github/workflows/flutter-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend_flutter/sao_windows/**'
      - '.github/workflows/flutter-ci.yml'

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_flutter/sao_windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter test suite
        run: flutter test
