name: CodeQL Security & Quality

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/codeql.yml'
  schedule:
    # Full weekly scan every Monday at 03:00 UTC (independent of code changes)
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to GitHub Security tab
  actions: read            # Required for private repositories

jobs:
  analyze-python:
    name: Analyze Python (backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-and-quality includes both security + performance/reliability queries
          queries: security-and-quality
          # Limit analysis to the backend directory
          config: |
            paths:
              - backend/app
            paths-ignore:
              - backend/alembic
              - backend/tests
              - backend/scripts
              - '**/__pycache__'
              - '**/*.pyc'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        # CodeQL traces imports so dependencies must be installed before analysis
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:python'
          upload: always
          output: codeql-results

      - name: Gate — fail on High/Critical alerts
        # In SARIF: level "error" = Critical/High, "warning" = Medium, "note" = Low
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib

          sarif_path = pathlib.Path("codeql-results/python.sarif")

          # Guard 1: file missing (CodeQL skipped or action misconfigured)
          if not sarif_path.exists():
              print("::warning::SARIF file not found — gate skipped (no results to evaluate)")
              sys.exit(0)

          # Guard 2: file is empty (CodeQL ran but produced 0 results)
          if sarif_path.stat().st_size == 0:
              print("SARIF file is empty — CodeQL found nothing, gate passed")
              sys.exit(0)

          try:
              with open(sarif_path) as f:
                  sarif = json.load(f)
          except json.JSONDecodeError as exc:
              print(f"::warning::SARIF file is not valid JSON ({exc}) — gate skipped")
              sys.exit(0)

          alerts = []
          for run in sarif.get("runs", []):
              rules = {
                  r["id"]: r
                  for r in run.get("tool", {})
                            .get("driver", {})
                            .get("rules", [])
              }
              for result in run.get("results", []):
                  level = result.get("level", "warning")
                  if level != "error":   # only error = High/Critical
                      continue
                  rule_id = result.get("ruleId", "unknown")
                  rule    = rules.get(rule_id, {})
                  name    = rule.get("name", rule_id)
                  msg     = result.get("message", {}).get("text", "")
                  loc     = ""
                  locs    = result.get("locations", [])
                  if locs:
                      pl   = locs[0].get("physicalLocation", {})
                      uri  = pl.get("artifactLocation", {}).get("uri", "")
                      line = pl.get("region", {}).get("startLine", "")
                      loc  = f"{uri}:{line}"
                  alerts.append(f"  [{rule_id}] {name} — {msg} ({loc})")

          if alerts:
              print(f"::error::CodeQL found {len(alerts)} High/Critical alert(s) — deploy blocked:")
              for a in alerts:
                  print(a)
              sys.exit(1)

          print("CodeQL gate passed — no High/Critical alerts.")
          EOF

      - name: Upload SARIF as artifact (for offline review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ github.sha }}
          path: codeql-results/python.sarif
          retention-days: 90
