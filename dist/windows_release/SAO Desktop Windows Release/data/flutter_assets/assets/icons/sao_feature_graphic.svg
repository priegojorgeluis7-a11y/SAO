<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#091C2E"/>
      <stop offset="55%"  stop-color="#0C3D58"/>
      <stop offset="100%" stop-color="#0C5F6A"/>
    </linearGradient>
    <radialGradient id="glow" cx="220" cy="250" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1C7090" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#091C2E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="800" cy="250" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F4A020" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#091C2E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="80" y1="60" x2="370" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFC938"/>
      <stop offset="55%"  stop-color="#F4A020"/>
      <stop offset="100%" stop-color="#E07412"/>
    </linearGradient>
    <linearGradient id="doc" x1="148" y1="120" x2="290" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2EDF8"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.4" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
    <filter id="ds">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="rglow">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#dots)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>
  <rect width="1024" height="500" fill="url(#glowR)"/>

  <!-- Divider line right side -->
  <line x1="490" y1="60" x2="490" y2="440" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.07"/>

  <!-- ── LEFT: Icon mark ── -->
  <!-- Dark disk -->
  <circle cx="220" cy="250" r="176" fill="#0A2F45" opacity="0.75"/>
  <!-- Ring glow -->
  <circle cx="220" cy="250" r="152" fill="none" stroke="#F4A020" stroke-width="50" opacity="0.12" filter="url(#rglow)"/>
  <!-- Main ring -->
  <circle cx="220" cy="250" r="152" fill="none" stroke="url(#ring)" stroke-width="24"/>
  <!-- Ring highlight -->
  <circle cx="220" cy="250" r="152" fill="none" stroke="#FFE899" stroke-width="4" opacity="0.35"/>

  <!-- Document card -->
  <rect x="148" y="122" width="144" height="178" rx="18" fill="url(#doc)" filter="url(#ds)"/>
  <!-- Header dots -->
  <circle cx="168" cy="142" r="4.5" fill="#8BAFC6" opacity="0.6"/>
  <circle cx="183" cy="142" r="4.5" fill="#8BAFC6" opacity="0.6"/>
  <circle cx="198" cy="142" r="4.5" fill="#8BAFC6" opacity="0.6"/>
  <!-- Separator -->
  <line x1="160" y1="154" x2="280" y2="154" stroke="#BED0DF" stroke-width="1"/>
  <!-- Row 1 check -->
  <polyline points="162,198 172,210 190,188" fill="none" stroke="#1BAD78" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="198" y="193" width="74" height="8" rx="4" fill="#BDD0E0"/>
  <!-- Row 2 check -->
  <polyline points="162,231 172,243 190,221" fill="none" stroke="#1BAD78" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="198" y="226" width="62" height="8" rx="4" fill="#BDD0E0"/>
  <!-- Row 3 pending -->
  <circle cx="176" cy="270" r="8" fill="none" stroke="#E8A820" stroke-width="6"/>
  <rect x="198" y="265" width="50" height="8" rx="4" fill="#BDD0E0"/>

  <!-- ── RIGHT: Text ── -->
  <!-- "SAO" wordmark -->
  <text x="524" y="208" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="88" font-weight="800" letter-spacing="-3"
        fill="#FFFFFF">SAO</text>

  <!-- Amber underline accent -->
  <rect x="524" y="222" width="176" height="5" rx="2.5" fill="url(#ring)" opacity="0.85"/>

  <!-- Tagline -->
  <text x="526" y="268" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="19.5" font-weight="400" letter-spacing="0.3"
        fill="#FFFFFF" fill-opacity="0.72">Sistema de Administración Operativa</text>

  <!-- Feature bullets -->
  <!-- bullet 1 -->
  <circle cx="537" cy="318" r="5" fill="#F4A020"/>
  <text x="553" y="323" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="#FFFFFF" fill-opacity="0.82">Gestión de actividades de campo</text>
  <!-- bullet 2 -->
  <circle cx="537" cy="350" r="5" fill="#F4A020"/>
  <text x="553" y="355" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="#FFFFFF" fill-opacity="0.82">Expediente digital y trazabilidad</text>
  <!-- bullet 3 -->
  <circle cx="537" cy="382" r="5" fill="#F4A020"/>
  <text x="553" y="387" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="#FFFFFF" fill-opacity="0.82">Reportes PDF e integración con Drive</text>
</svg>
